name: power_cycle_test
description: "Simulate a hardware power cycle test sequence"
inputs:
  device_id: "str"
  wait_seconds: "float"
steps:
  - name: log_start
    brick: log_message
    params:
      message: "Starting power cycle for device ${inputs.device_id}"
    save_as: start_log

  - name: power_off
    brick: set_power_state
    params:
      device_id: "${inputs.device_id}"
      state: "off"
    save_as: power_off_result

  - name: wait_for_off
    brick: wait_seconds
    params:
      seconds: "${inputs.wait_seconds}"
    save_as: wait_result

  - name: power_on
    brick: set_power_state
    params:
      device_id: "${inputs.device_id}"
      state: "on"
    save_as: power_on_result

  - name: verify_online
    brick: check_device_online
    params:
      device_id: "${inputs.device_id}"
    save_as: online_check

outputs_map:
  success: "${online_check}"
  device: "${inputs.device_id}"
