[project]
name = "bricks-provider-claudecode"
version = "0.1.0"
description = "Bricks LLMProvider that routes through Claude Code CLI (claude -p)"
requires-python = ">=3.10"
dependencies = ["bricks"]

[project.entry-points."bricks.providers"]
claudecode = "bricks_provider_claudecode:ClaudeCodeProvider"

[build-system]
requires = ["setuptools>=68.0"]
build-backend = "setuptools.build_meta"

[tool.setuptools.packages.find]
where = ["src"]
