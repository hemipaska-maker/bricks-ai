[project]
name = "bricks-ai"
version = "0.4.45"
description = "Deterministic execution engine: typed Python building blocks composed into auditable YAML blueprints."
requires-python = ">=3.10"
license = "MIT"
authors = [
    { name = "Hemi", email = "hemipaska@gmail.com" },
]
keywords = ["bricks", "ai", "agents", "deterministic", "workflow", "yaml", "automation", "llm", "mcp"]
classifiers = [
    "Development Status :: 3 - Alpha",
    "Intended Audience :: Developers",
    "Programming Language :: Python :: 3",
    "Programming Language :: Python :: 3.10",
    "Programming Language :: Python :: 3.11",
    "Programming Language :: Python :: 3.12",
    "Topic :: Software Development :: Libraries :: Application Frameworks",
    "Topic :: Scientific/Engineering :: Artificial Intelligence",
    "Typing :: Typed",
]
readme = {file = "README.md", content-type = "text/markdown"}

dependencies = [
    "pydantic>=2.0",
    "typer>=0.9",
    "ruamel.yaml>=0.18",
    "rich>=13.0",
    "tzdata>=2024.1; sys_platform == 'win32'",
]

[project.optional-dependencies]
stdlib = ["bricks-ai-stdlib>=0.4.23"]
ai = ["litellm>=1.0,<1.82.7"]
mcp = ["mcp>=1.0"]
all = ["bricks-ai-stdlib>=0.4.23", "litellm>=1.0,<1.82.7", "mcp>=1.0"]
dev = [
    "pytest>=9.0",
    "mypy>=1.8",
    "ruff>=0.3",
]

[project.scripts]
bricks = "bricks.cli.main:app"

[project.urls]
Homepage = "https://github.com/hemipaska-maker/bricks"
Repository = "https://github.com/hemipaska-maker/bricks"
Issues = "https://github.com/hemipaska-maker/bricks/issues"
Documentation = "https://github.com/hemipaska-maker/bricks#readme"

[build-system]
requires = ["setuptools>=68.0"]
build-backend = "setuptools.build_meta"

[tool.setuptools.packages.find]
where = ["src"]
