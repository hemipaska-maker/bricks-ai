[project]
name = "bricks"
version = "0.4.24"
description = "Deterministic execution engine: typed Python building blocks composed into auditable YAML blueprints."
requires-python = ">=3.10"
license = "MIT"
authors = [
    { name = "Hemi", email = "hemi@example.com" },
]
keywords = ["sequencing", "automation", "bricks", "yaml", "workflow", "validation"]
classifiers = [
    "Development Status :: 3 - Alpha",
    "Intended Audience :: Developers",
    "Programming Language :: Python :: 3",
    "Programming Language :: Python :: 3.10",
    "Programming Language :: Python :: 3.11",
    "Programming Language :: Python :: 3.12",
    "Typing :: Typed",
]

dependencies = [
    "pydantic>=2.0",
    "typer>=0.9",
    "ruamel.yaml>=0.18",
    "tzdata>=2024.1; sys_platform == 'win32'",
]

[project.optional-dependencies]
stdlib = ["bricks-stdlib>=0.4.23"]
ai = ["litellm>=1.0"]
mcp = ["mcp>=1.0"]
all = ["bricks-stdlib>=0.4.23", "litellm>=1.0", "mcp>=1.0"]
dev = [
    "pytest>=9.0",
    "mypy>=1.8",
    "ruff>=0.3",
]

[project.scripts]
bricks = "bricks.cli.main:app"

[project.urls]
Homepage = "https://gitlab.com/hemi/bricks"
Repository = "https://gitlab.com/hemi/bricks"
Issues = "https://gitlab.com/hemi/bricks/-/issues"

[build-system]
requires = ["setuptools>=68.0"]
build-backend = "setuptools.build_meta"

[tool.setuptools.packages.find]
where = ["src"]
