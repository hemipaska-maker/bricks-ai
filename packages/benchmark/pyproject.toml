[project]
name = "bricks-benchmark"
version = "0.4.23"
description = "Benchmark suite for the Bricks execution engine."
requires-python = ">=3.10"
license = "MIT"
authors = [
    { name = "Hemi", email = "hemi@example.com" },
]

dependencies = [
    "bricks-ai>=0.4.23",
    "bricks-ai-stdlib>=0.4.23",
    "tiktoken>=0.5",
    "matplotlib>=3.7",
]

[project.urls]
Homepage = "https://gitlab.com/hemi/bricks"

[build-system]
requires = ["setuptools>=68.0"]
build-backend = "setuptools.build_meta"

[tool.setuptools.packages.find]
where = ["src"]
