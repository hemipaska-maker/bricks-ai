# Root dev configuration — not a publishable package.
# Each publishable package lives under packages/*/pyproject.toml.
#
# Dev setup:
#   pip install -e packages/core[dev,ai,mcp]
#   pip install -e packages/stdlib
#   pip install -e packages/benchmark

[tool.pytest.ini_options]
testpaths = ["tests", "packages/benchmark/src/bricks_benchmark/tests"]
pythonpath = [
    "packages/core/src",
    "packages/stdlib/src",
    "packages/benchmark/src",
    "packages/provider-claudecode/src",
]
markers = [
    "live: live integration tests that call real LLM via ClaudeCodeProvider (run with --live)",
]

[tool.mypy]
strict = true
plugins = ["pydantic.mypy"]

[tool.ruff]
target-version = "py310"
line-length = 120

[tool.ruff.lint]
select = [
    "E",    # pycodestyle errors
    "F",    # pyflakes
    "I",    # isort
    "N",    # pep8-naming
    "W",    # pycodestyle warnings
    "UP",   # pyupgrade
    "B",    # flake8-bugbear
    "SIM",  # flake8-simplify
    "RUF",  # ruff-specific rules
    "C4",   # flake8-comprehensions
    "PTH",  # flake8-use-pathlib
    "S",    # flake8-bandit (security)
    "PLC",  # pylint convention
    "PLE",  # pylint error
]

[tool.ruff.lint.per-file-ignores]
"tests/**/*.py" = ["S101", "PLC0415"]
"packages/**/tests/**/*.py" = ["S101", "PLC0415"]
"packages/benchmark/**/*.py" = ["S101", "PLC0415", "S607"]
"examples/**/*.py" = ["PLC0415"]
